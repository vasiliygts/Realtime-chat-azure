# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - app-realtime-chat-web-vasiliygts

on:
  push:
    branches:
      - dev
    paths:
      - 'Chat.Web/**'
      - '.github/workflows/dev_app-realtime-chat-web-vasiliygts.yml'  
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    defaults:
      run:
        working-directory: ./Chat.Web
        
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: ./Chat.Web/package-lock.json
          
      - name: Install dependencies
        run: npm ci

      - name: Build app
        env:
          VITE_API_BASE_URL: "https://app-realtime-chat-api-vasiliygts-ehhyhcfgh4buejda.polandcentral-01.azurewebsites.net"
        run: npm run build

      - name: Test app
        run: npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./Chat.Web

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./node-app
          
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-realtime-chat-web-vasiliygts'
          slot-name: 'Production'
          package: ./node-app
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B6665A3FD6D1405FA0CED57CB36B2346 }}
