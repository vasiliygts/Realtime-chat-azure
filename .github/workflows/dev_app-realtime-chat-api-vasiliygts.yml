# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - app-realtime-chat-api-vasiliygts

on:
  push:
    branches:
      - dev
    paths:
      - 'Chat.Api/**'
      - '.github/workflows/dev_app-realtime-chat-api-vasiliygts.yml'  
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore ./Chat.Api/Chat.Api.csproj

      - name: Build
        run: dotnet build ./Chat.Api/Chat.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./Chat.Api/Chat.Api.csproj --configuration Release --no-build --output ./publish

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: api-app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: api-app
          path: ./publish
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-realtime-chat-api-vasiliygts'
          slot-name: 'Production'
          package: ./publish
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_1C14F1E2614F41FB96A56DB2BE7F6991 }}
